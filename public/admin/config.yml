backend:
  name: git-gateway
  branch: main # Mude para a sua branch principal se necessário

media_folder: "public/images"
public_folder: "/images"

local_backend: true # Permite editar localmente sem precisar de um servidor Git configurado

collections:
  - name: "config"
    label: "Configurações"
    files:
      - label: "Serviços"
        name: "servicos"
        file: "src/content/servicos.json"
        fields:
          - label: "Lista de Categorias"
            name: "categories"
            widget: "list"
            fields:
              - { label: "Título da Categoria", name: "title", widget: "string" }
              - { label: "Imagem (URL)", name: "image", widget: "image" }
              - label: "Lista de Serviços", name: "services", widget: "list", fields: [
                  { label: "Nome do Serviço", name: "name", widget: "string" },
                  { label: "Preço", name: "price", widget: "string" }
                ]
              }
      - label: "Galeria"
        name: "galeria"
        file: "src/content/galeria.json"
        fields:
          - label: "Imagens"
            name: "images"
            widget: "list"
            fields:
              - { label: "Imagem", name: "url", widget: "image" }
              - { label: "Legenda", name: "caption", widget: "string" }
